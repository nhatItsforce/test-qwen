<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive 3D Globe - Explore the World</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            background: linear-gradient(135deg, #0c0c1e 0%, #1a1a3e 50%, #0f0f2d 100%);
            color: #ffffff;
        }

        #canvas-container {
            width: 100vw;
            height: 100vh;
            position: relative;
        }

        canvas {
            display: block;
        }

        /* Header */
        .header {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            padding: 20px 40px;
            z-index: 100;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: linear-gradient(180deg, rgba(0,0,0,0.6) 0%, transparent 100%);
        }

        .logo {
            font-size: 28px;
            font-weight: 700;
            background: linear-gradient(90deg, #00d4ff, #7b2fff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .nav-links {
            display: flex;
            gap: 30px;
        }

        .nav-links a {
            color: #ffffff;
            text-decoration: none;
            font-size: 16px;
            opacity: 0.8;
            transition: opacity 0.3s;
        }

        .nav-links a:hover {
            opacity: 1;
        }

        /* Info Panel */
        .info-panel {
            position: absolute;
            top: 50%;
            right: 40px;
            transform: translateY(-50%);
            width: 350px;
            background: rgba(15, 15, 45, 0.9);
            backdrop-filter: blur(20px);
            border-radius: 20px;
            padding: 30px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
            opacity: 0;
            visibility: hidden;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 100;
        }

        .info-panel.visible {
            opacity: 1;
            visibility: visible;
        }

        .info-panel h2 {
            font-size: 28px;
            margin-bottom: 8px;
            background: linear-gradient(90deg, #00d4ff, #7b2fff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .info-panel .region {
            font-size: 14px;
            color: #00d4ff;
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .info-panel .description {
            font-size: 15px;
            line-height: 1.8;
            color: #b8b8d0;
            margin-bottom: 25px;
        }

        .info-stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .stat-item {
            background: rgba(255, 255, 255, 0.05);
            padding: 15px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .stat-label {
            font-size: 12px;
            color: #8888aa;
            margin-bottom: 5px;
        }

        .stat-value {
            font-size: 18px;
            font-weight: 600;
            color: #ffffff;
        }

        /* Instructions */
        .instructions {
            position: absolute;
            bottom: 40px;
            left: 40px;
            z-index: 100;
        }

        .instructions h3 {
            font-size: 18px;
            margin-bottom: 15px;
            color: #ffffff;
        }

        .instruction-item {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 10px;
            font-size: 14px;
            color: #b8b8d0;
        }

        .icon {
            width: 36px;
            height: 36px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
        }

        /* Loading */
        .loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 200;
            text-align: center;
        }

        .spinner {
            width: 60px;
            height: 60px;
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-top-color: #00d4ff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Responsive */
        @media (max-width: 768px) {
            .info-panel {
                width: calc(100% - 40px);
                right: 20px;
                top: auto;
                bottom: 120px;
                transform: none;
            }

            .header {
                padding: 15px 20px;
            }

            .nav-links {
                display: none;
            }

            .instructions {
                bottom: 20px;
                left: 20px;
            }
        }
    </style>
</head>
<body>
    <div id="canvas-container"></div>

    <div class="header">
        <div class="logo">🌍 GlobeExplorer</div>
        <nav class="nav-links">
            <a href="#">Home</a>
            <a href="#">Explore</a>
            <a href="#">About</a>
            <a href="#">Contact</a>
        </nav>
    </div>

    <div class="info-panel" id="infoPanel">
        <h2 id="countryName">Country Name</h2>
        <div class="region" id="regionName">Region</div>
        <p class="description" id="description">Description text will appear here.</p>
        <div class="info-stats">
            <div class="stat-item">
                <div class="stat-label">Population</div>
                <div class="stat-value" id="population">-</div>
            </div>
            <div class="stat-item">
                <div class="stat-label">Capital</div>
                <div class="stat-value" id="capital">-</div>
            </div>
        </div>
    </div>

    <div class="instructions">
        <h3>How to Interact</h3>
        <div class="instruction-item">
            <div class="icon">🖱️</div>
            <span>Drag to rotate the globe</span>
        </div>
        <div class="instruction-item">
            <div class="icon">🔍</div>
            <span>Scroll to zoom in/out</span>
        </div>
        <div class="instruction-item">
            <div class="icon">✨</div>
            <span>Hover over countries for details</span>
        </div>
    </div>

    <div class="loading" id="loading">
        <div class="spinner"></div>
        <p id="loadingText">Loading Globe...</p>
        <p id="errorMessage" style="color: #ff6b6b; margin-top: 10px; display: none;"></p>
    </div>

    <!-- Try multiple CDN sources for Three.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        // Fallback if Three.js didn't load
        if (typeof THREE === 'undefined') {
            const script = document.createElement('script');
            script.src = 'https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js';
            script.onload = function() {
                if (typeof THREE === 'undefined') {
                    showLoadError();
                } else {
                    init();
                }
            };
            script.onerror = showLoadError;
            document.head.appendChild(script);
        }

        function showLoadError() {
            document.getElementById('loadingText').textContent = 'Failed to load Three.js';
            document.getElementById('errorMessage').style.display = 'block';
            document.getElementById('errorMessage').textContent = 'Please check your internet connection or try again later.';
        }

        // Country data with coordinates and information
        const countryData = {
            'US': { name: 'United States', region: 'North America', description: 'A diverse nation with vast landscapes, from bustling cities to natural wonders.', population: '331M', capital: 'Washington D.C.', coords: [40, -100] },
            'CA': { name: 'Canada', region: 'North America', description: 'The second-largest country by area, known for its wilderness and multicultural cities.', population: '38M', capital: 'Ottawa', coords: [56, -106] },
            'BR': { name: 'Brazil', region: 'South America', description: 'Home to the Amazon rainforest and vibrant culture, famous for carnival and football.', population: '213M', capital: 'Brasília', coords: [-14, -51] },
            'GB': { name: 'United Kingdom', region: 'Europe', description: 'An island nation with rich history, from ancient castles to modern metropolitan life.', population: '67M', capital: 'London', coords: [54, -2] },
            'FR': { name: 'France', region: 'Europe', description: 'Known for art, fashion, gastronomy, and iconic landmarks like the Eiffel Tower.', population: '67M', capital: 'Paris', coords: [46, 2] },
            'DE': { name: 'Germany', region: 'Europe', description: 'A European powerhouse blending medieval charm with cutting-edge innovation.', population: '83M', capital: 'Berlin', coords: [51, 9] },
            'IT': { name: 'Italy', region: 'Europe', description: 'Birthplace of the Roman Empire and Renaissance, famous for art, cuisine, and architecture.', population: '60M', capital: 'Rome', coords: [42, 12] },
            'ES': { name: 'Spain', region: 'Europe', description: 'A Mediterranean gem with diverse culture, flamenco, and stunning beaches.', population: '47M', capital: 'Madrid', coords: [40, -4] },
            'RU': { name: 'Russia', region: 'Asia/Europe', description: 'The largest country spanning Eastern Europe and Northern Asia.', population: '144M', capital: 'Moscow', coords: [61, 105] },
            'CN': { name: 'China', region: 'Asia', description: 'Ancient civilization with rapid modernization, rich culture, and diverse landscapes.', population: '1.4B', capital: 'Beijing', coords: [35, 104] },
            'IN': { name: 'India', region: 'Asia', description: 'A land of diversity with ancient traditions, vibrant festivals, and growing economy.', population: '1.38B', capital: 'New Delhi', coords: [20, 77] },
            'JP': { name: 'Japan', region: 'Asia', description: 'Island nation blending ancient traditions with futuristic technology.', population: '126M', capital: 'Tokyo', coords: [36, 138] },
            'AU': { name: 'Australia', region: 'Oceania', description: 'Unique wildlife, stunning coastlines, and the Great Barrier Reef.', population: '25M', capital: 'Canberra', coords: [-25, 133] },
            'ZA': { name: 'South Africa', region: 'Africa', description: 'Rainbow Nation with diverse cultures, wildlife safaris, and beautiful landscapes.', population: '59M', capital: 'Pretoria', coords: [-30, 25] },
            'EG': { name: 'Egypt', region: 'Africa', description: 'Land of pharaohs, pyramids, and the mysterious Nile River.', population: '102M', capital: 'Cairo', coords: [26, 30] },
            'NG': { name: 'Nigeria', region: 'Africa', description: 'Most populous African nation with vibrant culture and growing economy.', population: '206M', capital: 'Abuja', coords: [9, 8] },
            'AR': { name: 'Argentina', region: 'South America', description: 'Land of tango, wine, and dramatic landscapes from Andes to Patagonia.', population: '45M', capital: 'Buenos Aires', coords: [-38, -64] },
            'MX': { name: 'Mexico', region: 'North America', description: 'Rich indigenous heritage, delicious cuisine, and beautiful beaches.', population: '128M', capital: 'Mexico City', coords: [23, -102] },
            'KR': { name: 'South Korea', region: 'Asia', description: 'Dynamic nation known for technology, pop culture, and ancient temples.', population: '51M', capital: 'Seoul', coords: [36, 128] },
            'ID': { name: 'Indonesia', region: 'Asia', description: 'Archipelago of thousands of islands with diverse cultures and nature.', population: '273M', capital: 'Jakarta', coords: [-0.78, 113] }
        };

        // Scene setup
        let scene, camera, renderer, globe, markers = [];
        let hoveredMarker = null;
        let isDragging = false;
        let previousMousePosition = { x: 0, y: 0 };
        let targetRotationX = 0;
        let targetRotationY = 0;

        function init() {
            const container = document.getElementById('canvas-container');

            // Scene
            scene = new THREE.Scene();

            // Camera
            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 3.5;

            // Renderer
            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            container.appendChild(renderer.domElement);

            // Create globe
            createGlobe();

            // Add markers for countries
            addCountryMarkers();

            // Lighting
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
            scene.add(ambientLight);

            const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
            directionalLight.position.set(5, 3, 5);
            scene.add(directionalLight);

            const pointLight = new THREE.PointLight(0x00d4ff, 0.5);
            pointLight.position.set(-5, 2, -5);
            scene.add(pointLight);

            // Event listeners
            window.addEventListener('resize', onWindowResize);
            
            const canvas = renderer.domElement;
            canvas.addEventListener('mousedown', onMouseDown);
            canvas.addEventListener('mousemove', onMouseMove);
            canvas.addEventListener('mouseup', onMouseUp);
            canvas.addEventListener('wheel', onMouseWheel);
            
            // Touch events for mobile
            canvas.addEventListener('touchstart', onTouchStart);
            canvas.addEventListener('touchmove', onTouchMove);
            canvas.addEventListener('touchend', onTouchEnd);

            // Hide loading
            setTimeout(() => {
                document.getElementById('loading').style.display = 'none';
            }, 1500);

            animate();
        }

        function createGlobe() {
            // Globe geometry
            const geometry = new THREE.SphereGeometry(1, 64, 64);

            // Create gradient material
            const material = new THREE.MeshPhongMaterial({
                color: 0x1a4a8a,
                emissive: 0x0a1a3a,
                specular: 0x3366aa,
                shininess: 25,
                transparent: true,
                opacity: 0.95
            });

            globe = new THREE.Mesh(geometry, material);
            scene.add(globe);

            // Add wireframe overlay
            const wireframeGeometry = new THREE.WireframeGeometry(geometry);
            const wireframeMaterial = new THREE.LineBasicMaterial({
                color: 0x00d4ff,
                transparent: true,
                opacity: 0.15
            });
            const wireframe = new THREE.LineSegments(wireframeGeometry, wireframeMaterial);
            globe.add(wireframe);

            // Add atmosphere glow
            const atmosphereGeometry = new THREE.SphereGeometry(1.02, 64, 64);
            const atmosphereMaterial = new THREE.ShaderMaterial({
                vertexShader: `
                    varying vec3 vNormal;
                    void main() {
                        vNormal = normalize(normalMatrix * normal);
                        gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
                    }
                `,
                fragmentShader: `
                    varying vec3 vNormal;
                    void main() {
                        float intensity = pow(0.7 - dot(vNormal, vec3(0.0, 0.0, 1.0)), 2.0);
                        gl_FragColor = vec4(0.0, 0.8, 1.0, intensity);
                    }
                `,
                blending: THREE.AdditiveBlending,
                side: THREE.BackSide,
                transparent: true
            });
            const atmosphere = new THREE.Mesh(atmosphereGeometry, atmosphereMaterial);
            scene.add(atmosphere);

            // Add stars
            addStars();
        }

        function addStars() {
            const starGeometry = new THREE.BufferGeometry();
            const starCount = 2000;
            const positions = new Float32Array(starCount * 3);

            for (let i = 0; i < starCount * 3; i += 3) {
                positions[i] = (Math.random() - 0.5) * 100;
                positions[i + 1] = (Math.random() - 0.5) * 100;
                positions[i + 2] = (Math.random() - 0.5) * 100;
            }

            starGeometry.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));

            const starMaterial = new THREE.PointsMaterial({
                color: 0xffffff,
                size: 0.1,
                transparent: true,
                opacity: 0.8
            });

            const stars = new THREE.Points(starGeometry, starMaterial);
            scene.add(stars);
        }

        function latLonToVector3(lat, lon, radius) {
            const phi = (90 - lat) * (Math.PI / 180);
            const theta = (lon + 180) * (Math.PI / 180);

            const x = -(radius * Math.sin(phi) * Math.cos(theta));
            const z = radius * Math.sin(phi) * Math.sin(theta);
            const y = radius * Math.cos(phi);

            return new THREE.Vector3(x, y, z);
        }

        function addCountryMarkers() {
            Object.entries(countryData).forEach(([code, data]) => {
                const position = latLonToVector3(data.coords[0], data.coords[1], 1.01);

                // Create marker
                const markerGeometry = new THREE.SphereGeometry(0.015, 16, 16);
                const markerMaterial = new THREE.MeshBasicMaterial({
                    color: 0x00d4ff,
                    transparent: true,
                    opacity: 0.8
                });

                const marker = new THREE.Mesh(markerGeometry, markerMaterial);
                marker.position.copy(position);
                marker.userData = { code, ...data };

                // Add ring around marker
                const ringGeometry = new THREE.RingGeometry(0.02, 0.03, 32);
                const ringMaterial = new THREE.MeshBasicMaterial({
                    color: 0x00d4ff,
                    transparent: true,
                    opacity: 0.6,
                    side: THREE.DoubleSide
                });

                const ring = new THREE.Mesh(ringGeometry, ringMaterial);
                ring.position.copy(position);
                ring.lookAt(new THREE.Vector3(0, 0, 0));
                ring.userData = { code, ...data };

                globe.add(marker);
                globe.add(ring);
                markers.push(marker, ring);
            });
        }

        function onMouseDown(event) {
            isDragging = true;
            previousMousePosition = {
                x: event.clientX,
                y: event.clientY
            };
        }

        function onMouseMove(event) {
            if (!isDragging) {
                checkHover(event);
                return;
            }

            const deltaX = event.clientX - previousMousePosition.x;
            const deltaY = event.clientY - previousMousePosition.y;

            targetRotationY += deltaX * 0.005;
            targetRotationX += deltaY * 0.005;

            targetRotationX = Math.max(-Math.PI / 2, Math.min(Math.PI / 2, targetRotationX));

            previousMousePosition = {
                x: event.clientX,
                y: event.clientY
            };
        }

        function onMouseUp() {
            isDragging = false;
        }

        function onMouseWheel(event) {
            camera.position.z += event.deltaY * 0.002;
            camera.position.z = Math.max(2, Math.min(6, camera.position.z));
        }

        function onTouchStart(event) {
            if (event.touches.length === 1) {
                isDragging = true;
                previousMousePosition = {
                    x: event.touches[0].clientX,
                    y: event.touches[0].clientY
                };
            }
        }

        function onTouchMove(event) {
            if (isDragging && event.touches.length === 1) {
                const deltaX = event.touches[0].clientX - previousMousePosition.x;
                const deltaY = event.touches[0].clientY - previousMousePosition.y;

                targetRotationY += deltaX * 0.005;
                targetRotationX += deltaY * 0.005;

                targetRotationX = Math.max(-Math.PI / 2, Math.min(Math.PI / 2, targetRotationX));

                previousMousePosition = {
                    x: event.touches[0].clientX,
                    y: event.touches[0].clientY
                };
            }
        }

        function onTouchEnd() {
            isDragging = false;
        }

        function checkHover(event) {
            const mouse = new THREE.Vector2();
            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

            const raycaster = new THREE.Raycaster();
            raycaster.setFromCamera(mouse, camera);

            const intersects = raycaster.intersectObjects(markers);

            if (intersects.length > 0) {
                const object = intersects[0].object;
                if (hoveredMarker !== object) {
                    // Reset previous marker
                    if (hoveredMarker) {
                        resetMarker(hoveredMarker);
                    }

                    // Set new hovered marker
                    hoveredMarker = object;
                    highlightMarker(object);
                    showInfo(object.userData);
                }
            } else {
                if (hoveredMarker) {
                    resetMarker(hoveredMarker);
                    hoveredMarker = null;
                    hideInfo();
                }
            }
        }

        function highlightMarker(marker) {
            marker.material.color.setHex(0x7b2fff);
            marker.material.opacity = 1;
            marker.scale.set(2, 2, 2);
        }

        function resetMarker(marker) {
            marker.material.color.setHex(0x00d4ff);
            marker.material.opacity = 0.8;
            marker.scale.set(1, 1, 1);
        }

        function showInfo(data) {
            const panel = document.getElementById('infoPanel');
            
            document.getElementById('countryName').textContent = data.name;
            document.getElementById('regionName').textContent = data.region;
            document.getElementById('description').textContent = data.description;
            document.getElementById('population').textContent = data.population;
            document.getElementById('capital').textContent = data.capital;

            panel.classList.add('visible');
        }

        function hideInfo() {
            const panel = document.getElementById('infoPanel');
            panel.classList.remove('visible');
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);

            // Smooth rotation
            if (!isDragging) {
                globe.rotation.y += 0.001;
            } else {
                globe.rotation.x = targetRotationX;
                globe.rotation.y = targetRotationY;
            }

            // Animate markers
            markers.forEach((marker, index) => {
                if (marker !== hoveredMarker) {
                    const scale = 1 + Math.sin(Date.now() * 0.002 + index) * 0.1;
                    marker.scale.set(scale, scale, scale);
                }
            });

            renderer.render(scene, camera);
        }

        // Only initialize if Three.js is loaded
        if (typeof THREE !== 'undefined') {
            init();
        }
    </script>
</body>
</html>
